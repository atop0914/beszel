<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beszel — Server Monitor</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f1117;
    --card: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --text-dim: #484f58;
    --accent-blue: #58a6ff;
    --accent-purple: #a371f7;
    --accent-green: #3fb950;
    --accent-orange: #f0883e;
    --accent-red: #f85149;
    --code-bg: #21262d;
    --gauge-bg: #21262d;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.5;
  }

  /* ── Header ── */
  header {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 0.875rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .header-left { display: flex; align-items: center; gap: 0.75rem; }
  .header-left h1 { font-size: 1.125rem; font-weight: 700; letter-spacing: -0.02em; }
  .header-left .tag {
    font-size: 0.65rem;
    background: var(--accent-green);
    color: #0f1117;
    padding: 0.1rem 0.45rem;
    border-radius: 20px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .header-right { display: flex; align-items: center; gap: 1rem; }
  .header-stat { text-align: right; }
  .header-stat .label { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; display: block; }
  .header-stat .value { font-size: 0.875rem; font-weight: 600; color: var(--text); }
  .header-stat .value.live { color: var(--accent-green); animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

  /* ── Main ── */
  main { padding: 1.25rem 1.5rem 2rem; max-width: 1300px; margin: 0 auto; }

  /* ── Server Info Panel ── */
  .server-info {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.875rem 1.25rem;
    margin-bottom: 1.25rem;
    display: flex;
    align-items: center;
    gap: 2rem;
    flex-wrap: wrap;
  }
  .server-info .hostname-block { display: flex; align-items: center; gap: 0.5rem; }
  .server-info .hostname-block .icon { font-size: 1.1rem; }
  .server-info .hostname-block .name { font-size: 1rem; font-weight: 700; }
  .server-info .hostname-block .uptime {
    font-size: 0.75rem;
    color: var(--text-muted);
    background: var(--code-bg);
    padding: 0.15rem 0.5rem;
    border-radius: 20px;
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
  }
  .server-info .divider { width: 1px; height: 28px; background: var(--border); }
  .server-info .info-grid { display: flex; gap: 1.5rem; flex-wrap: wrap; }
  .server-info .info-item .info-label { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; display: block; }
  .server-info .info-item .info-value { font-size: 0.8rem; font-weight: 600; color: var(--text); }
  .server-info .load-block { display: flex; gap: 0.75rem; align-items: center; }
  .server-info .load-chip {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.2rem 0.6rem;
    font-size: 0.75rem;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 0.3rem;
  }
  .load-chip .load-label { color: var(--text-muted); font-size: 0.65rem; }
  .load-chip .load-val { color: var(--accent-blue); }

  /* ── Gauge Grid ── */
  .gauge-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1rem;
    margin-bottom: 1.25rem;
  }
  .gauge-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
  }
  .gauge-card .card-header {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.4rem;
    margin-bottom: 0.5rem;
    width: 100%;
  }
  .gauge-card .card-title {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    font-weight: 600;
  }
  .gauge-card .tooltip-btn {
    font-size: 0.7rem;
    color: var(--text-dim);
    cursor: help;
    border: none;
    background: none;
    padding: 0;
    line-height: 1;
    position: relative;
  }
  .tooltip-btn:hover::after {
    content: attr(data-tip);
    position: absolute;
    bottom: calc(100% + 6px);
    left: 50%;
    transform: translateX(-50%);
    background: #2d333b;
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 0.7rem;
    padding: 0.35rem 0.6rem;
    border-radius: 6px;
    white-space: nowrap;
    z-index: 100;
    pointer-events: none;
    letter-spacing: 0;
    text-transform: none;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    max-width: 220px;
    white-space: normal;
    text-align: center;
  }
  .gauge-container { position: relative; width: 110px; height: 110px; }
  .gauge-canvas { width: 100%; height: 100%; }
  .gauge-value {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 1.35rem;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .gauge-detail { font-size: 0.72rem; color: var(--text-muted); margin-top: 0.4rem; text-align: center; font-variant-numeric: tabular-nums; }

  /* Network card */
  .network-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.4rem; width: 100%; }
  .network-item { background: var(--code-bg); border-radius: 6px; padding: 0.4rem; text-align: center; }
  .network-item .label { font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; display: block; }
  .network-item .value { font-size: 0.85rem; font-weight: 700; margin-top: 0.15rem; font-variant-numeric: tabular-nums; }
  .network-item.rx .value { color: var(--accent-blue); }
  .network-item.tx .value { color: var(--accent-purple); }
  .gauge-card .gauge-detail { margin-top: 0.5rem; }

  /* ── Chart Section ── */
  .chart-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.125rem;
    margin-bottom: 1.25rem;
  }
  .chart-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.875rem; flex-wrap: wrap; gap: 0.5rem; }
  .chart-header h3 { font-size: 0.875rem; font-weight: 600; }
  .chart-tabs { display: flex; gap: 0.35rem; }
  .chart-tabs button {
    background: var(--code-bg);
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 0.3rem 0.7rem;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.75rem;
    font-weight: 500;
    transition: all 0.15s;
  }
  .chart-tabs button:hover { border-color: var(--text-muted); color: var(--text); }
  .chart-tabs button.active { background: rgba(56,139,253,0.15); border-color: var(--accent-blue); color: var(--accent-blue); }

  #metricsChart { max-height: 220px; }

  /* ── Containers ── */
  .containers-section { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 1.125rem; margin-bottom: 1.25rem; }
  .containers-header { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.875rem; }
  .containers-header h3 { font-size: 0.875rem; font-weight: 600; }
  .containers-header .count { font-size: 0.7rem; background: var(--code-bg); padding: 0.1rem 0.45rem; border-radius: 20px; color: var(--text-muted); }
  .container-list { display: flex; flex-direction: column; gap: 0.4rem; }
  .container-item {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.6rem 0.875rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 1rem;
    transition: border-color 0.15s;
  }
  .container-item:hover { border-color: var(--text-muted); }
  .container-name { font-size: 0.8rem; font-weight: 500; display: flex; align-items: center; gap: 0.4rem; }
  .container-name .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent-green); flex-shrink: 0; }
  .container-stats { display: flex; gap: 1.25rem; font-size: 0.75rem; color: var(--text-muted); flex-shrink: 0; }
  .container-stats span { font-variant-numeric: tabular-nums; }
  .container-stats .cpu-stat { color: var(--accent-blue); }
  .container-stats .mem-stat { color: var(--accent-purple); }

  /* ── Updated timestamp ── */
  .updated { text-align: center; font-size: 0.72rem; color: var(--text-dim); margin-top: 1rem; }

  /* ── Empty / loading ── */
  .empty-state { color: var(--text-muted); font-size: 0.875rem; padding: 1rem; text-align: center; }

  /* ── Responsive ── */
  @media (max-width: 900px) {
    .gauge-grid { grid-template-columns: repeat(2, 1fr); }
    .server-info { gap: 1rem; }
    .server-info .info-grid { gap: 1rem; }
    .server-info .load-block { flex-wrap: wrap; }
  }
  @media (max-width: 600px) {
    main { padding: 1rem; }
    header { padding: 0.75rem 1rem; }
    .gauge-grid { grid-template-columns: repeat(2, 1fr); gap: 0.75rem; }
    .gauge-container { width: 90px; height: 90px; }
    .gauge-value { font-size: 1.1rem; }
    .container-item { flex-direction: column; align-items: flex-start; }
    .container-stats { gap: 0.75rem; }
    .server-info .info-grid { gap: 0.75rem; }
    .header-stat .label { display: none; }
  }
</style>
</head>
<body>
<header>
  <div class="header-left">
    <h1>⚡ Beszel</h1>
    <span class="tag">Live</span>
  </div>
  <div class="header-right">
    <div class="header-stat">
      <span class="label">Uptime</span>
      <span class="value" id="header-uptime">—</span>
    </div>
    <div class="header-stat">
      <span class="label">Updated</span>
      <span class="value live" id="header-time">—</span>
    </div>
  </div>
</header>

<main>
  <!-- Server Info Panel -->
  <div class="server-info" id="server-info">
    <div class="hostname-block">
      <span class="icon">🖥️</span>
      <span class="name" id="hostname">—</span>
      <span class="uptime" id="uptime-chip">⏱ —</span>
    </div>
    <div class="divider"></div>
    <div class="info-grid">
      <div class="info-item">
        <span class="info-label">OS</span>
        <span class="info-value" id="os-info">—</span>
      </div>
      <div class="info-item">
        <span class="info-label">Kernel</span>
        <span class="info-value" id="kernel-info">—</span>
      </div>
      <div class="info-item">
        <span class="info-label">Platform</span>
        <span class="info-value" id="platform-info">—</span>
      </div>
    </div>
    <div class="divider"></div>
    <div class="load-block" id="load-block">
      <span class="load-chip"><span class="load-label">1m</span><span class="load-val" id="load1">—</span></span>
      <span class="load-chip"><span class="load-label">5m</span><span class="load-val" id="load5">—</span></span>
      <span class="load-chip"><span class="load-label">15m</span><span class="load-val" id="load15">—</span></span>
    </div>
  </div>

  <!-- Gauges -->
  <div class="gauge-grid">
    <div class="gauge-card">
      <div class="card-header">
        <span class="card-title">CPU</span>
        <button class="tooltip-btn" data-tip="CPU usage across all cores">ⓘ</button>
      </div>
      <div class="gauge-container">
        <canvas class="gauge-canvas" id="cpu-gauge" width="220" height="220"></canvas>
        <div class="gauge-value" id="cpu-val">—</div>
      </div>
      <div class="gauge-detail" id="cpu-detail">—</div>
    </div>
    <div class="gauge-card">
      <div class="card-header">
        <span class="card-title">Memory</span>
        <button class="tooltip-btn" data-tip="RAM usage: used / total">ⓘ</button>
      </div>
      <div class="gauge-container">
        <canvas class="gauge-canvas" id="mem-gauge" width="220" height="220"></canvas>
        <div class="gauge-value" id="mem-val">—</div>
      </div>
      <div class="gauge-detail" id="mem-detail">—</div>
    </div>
    <div class="gauge-card">
      <div class="card-header">
        <span class="card-title">Disk</span>
        <button class="tooltip-btn" data-tip="Disk usage of root partition: used / total">ⓘ</button>
      </div>
      <div class="gauge-container">
        <canvas class="gauge-canvas" id="disk-gauge" width="220" height="220"></canvas>
        <div class="gauge-value" id="disk-val">—</div>
      </div>
      <div class="gauge-detail" id="disk-detail">—</div>
    </div>
    <div class="gauge-card">
      <div class="card-header">
        <span class="card-title">Network I/O</span>
        <button class="tooltip-btn" data-tip="Network throughput: ingress ↓ RX, egress ↑ TX since last poll">ⓘ</button>
      </div>
      <div class="network-grid">
        <div class="network-item rx">
          <div class="label">↓ RX</div>
          <div class="value" id="net-rx">—</div>
        </div>
        <div class="network-item tx">
          <div class="label">↑ TX</div>
          <div class="value" id="net-tx">—</div>
        </div>
      </div>
      <div class="gauge-detail" id="net-total">Total: —</div>
    </div>
  </div>

  <!-- Charts -->
  <div class="chart-section">
    <div class="chart-header">
      <h3>📈 System Metrics</h3>
      <div class="chart-tabs">
        <button class="active" onclick="setChartRange(24)">24h</button>
        <button onclick="setChartRange(168)">7d</button>
      </div>
    </div>
    <canvas id="metricsChart"></canvas>
  </div>

  <!-- Containers -->
  <div class="containers-section">
    <div class="containers-header">
      <h3>🐳 Docker Containers</h3>
      <span class="count" id="container-count">0</span>
    </div>
    <div class="container-list" id="container-list">
      <div class="empty-state">No containers found</div>
    </div>
  </div>

  <div class="updated" id="updated">Loading…</div>
</main>

<script>
// ── Helpers ──────────────────────────────────────────────────────────────────
function fmtBytes(b) {
  if (b < 1024) return b + ' B';
  if (b < 1024 * 1024) return (b / 1024).toFixed(1) + ' KB';
  if (b < 1024 * 1024 * 1024) return (b / (1024 * 1024)).toFixed(1) + ' MB';
  return (b / (1024 * 1024 * 1024)).toFixed(2) + ' GB';
}

function fmtRate(bps) {
  if (bps < 1024) return bps + ' B/s';
  if (bps < 1024 * 1024) return (bps / 1024).toFixed(1) + ' KB/s';
  return (bps / (1024 * 1024)).toFixed(2) + ' MB/s';
}

function fmtUptime(seconds) {
  if (!seconds || seconds <= 0) return '—';
  const d = Math.floor(seconds / 86400);
  const h = Math.floor((seconds % 86400) / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  if (d > 0) return d + 'd ' + h + 'h ' + m + 'm';
  if (h > 0) return h + 'h ' + m + 'm';
  return m + 'm';
}

function fmtLoad(v) {
  if (v === undefined || v === null || isNaN(v)) return '—';
  return v.toFixed(2);
}

function colorFor(pct) {
  if (pct < 50) return 'var(--accent-green)';
  if (pct < 80) return 'var(--accent-orange)';
  return 'var(--accent-red)';
}

// ── Gauge ─────────────────────────────────────────────────────────────────────
class Gauge {
  constructor(canvasId, color) {
    this.canvas = document.getElementById(canvasId);
    this.ctx = this.canvas.getContext('2d');
    this.color = color;
  }

  draw(percent) {
    const dpr = window.devicePixelRatio || 1;
    const rect = this.canvas.getBoundingClientRect();
    this.canvas.width = rect.width * dpr;
    this.canvas.height = rect.height * dpr;
    this.ctx.scale(dpr, dpr);

    const cx = rect.width / 2;
    const cy = rect.height / 2;
    const r = Math.min(cx, cy) - 8;
    const lw = 7;
    const start = Math.PI * 0.75;
    const end = Math.PI * 2.25;
    const span = end - start;
    const val = start + (span * Math.min(percent, 100) / 100);

    this.ctx.beginPath();
    this.ctx.arc(cx, cy, r, start, end);
    this.ctx.strokeStyle = 'var(--gauge-bg)';
    this.ctx.lineWidth = lw;
    this.ctx.lineCap = 'round';
    this.ctx.stroke();

    this.ctx.beginPath();
    this.ctx.arc(cx, cy, r, start, val);
    this.ctx.strokeStyle = this.color;
    this.ctx.lineWidth = lw;
    this.ctx.lineCap = 'round';
    this.ctx.stroke();
  }
}

// ── State ─────────────────────────────────────────────────────────────────────
const cpuGauge = new Gauge('cpu-gauge', 'var(--accent-blue)');
const memGauge = new Gauge('mem-gauge', 'var(--accent-purple)');
const diskGauge = new Gauge('disk-gauge', 'var(--accent-green)');

let chart = null;
let chartRange = 24;
let systemUptime = 0; // seconds (boot time timestamp)

let lastNetworkRX = 0, lastNetworkTX = 0, lastNetworkTime = 0;
let currentRXRate = 0, currentTXRate = 0;

// ── API ───────────────────────────────────────────────────────────────────────
async function loadMetrics() {
  const res = await fetch('/api/metrics');
  if (!res.ok) return;
  const m = await res.json();

  // Server info panel
  document.getElementById('hostname').textContent = m.hostname || 'unknown';
  document.getElementById('os-info').textContent = m.os ? m.os.charAt(0).toUpperCase() + m.os.slice(1) : '—';
  document.getElementById('kernel-info').textContent = m.kernel || '—';
  document.getElementById('platform-info').textContent = m.platform || '—';
  document.getElementById('load1').textContent = fmtLoad(m.load1);
  document.getElementById('load5').textContent = fmtLoad(m.load5);
  document.getElementById('load15').textContent = fmtLoad(m.load15);

  // Uptime: m.uptime is seconds since boot
  systemUptime = m.uptime || 0;
  document.getElementById('uptime-chip').textContent = '⏱ ' + fmtUptime(systemUptime);
  document.getElementById('header-uptime').textContent = fmtUptime(systemUptime);

  // Gauges
  const cpuPct = m.cpu_percent || 0;
  const memPct = m.memory_percent || 0;
  const diskPct = m.disk_percent || 0;

  cpuGauge.draw(cpuPct);
  memGauge.draw(memPct);
  diskGauge.draw(diskPct);

  document.getElementById('cpu-val').textContent = cpuPct.toFixed(1) + '%';
  document.getElementById('cpu-val').style.color = colorFor(cpuPct);
  document.getElementById('cpu-detail').textContent = cpuPct.toFixed(1) + '% usage';

  document.getElementById('mem-val').textContent = memPct.toFixed(1) + '%';
  document.getElementById('mem-val').style.color = colorFor(memPct);
  document.getElementById('mem-detail').textContent = fmtBytes(m.memory_used) + ' / ' + fmtBytes(m.memory_total);

  document.getElementById('disk-val').textContent = diskPct.toFixed(1) + '%';
  document.getElementById('disk-val').style.color = colorFor(diskPct);
  document.getElementById('disk-detail').textContent = fmtBytes(m.disk_used) + ' / ' + fmtBytes(m.disk_total);

  // Network rate
  const now = Date.now();
  if (lastNetworkTime > 0) {
    const dt = (now - lastNetworkTime) / 1000;
    if (dt > 0) {
      currentRXRate = (m.network_rx - lastNetworkRX) / dt;
      currentTXRate = (m.network_tx - lastNetworkTX) / dt;
    }
  }
  lastNetworkRX = m.network_rx;
  lastNetworkTX = m.network_tx;
  lastNetworkTime = now;

  document.getElementById('net-rx').textContent = fmtRate(currentRXRate);
  document.getElementById('net-tx').textContent = fmtRate(currentTXRate);
  document.getElementById('net-total').textContent = 'Total: ' + fmtBytes(m.network_rx + m.network_tx);

  document.getElementById('header-time').textContent = new Date().toLocaleTimeString();
  document.getElementById('updated').textContent = 'Updated ' + new Date().toLocaleTimeString();
}

async function loadHistory() {
  const res = await fetch('/api/metrics/history?hours=' + chartRange);
  if (!res.ok) return;
  const data = await res.json();

  const labels = data.map(d => {
    const t = new Date(d.timestamp);
    return chartRange <= 24 ? t.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) : t.toLocaleDateString([], {month:'short',day:'numeric'});
  });

  const cpu = data.map(d => d.cpu_percent);
  const mem = data.map(d => d.memory_percent);
  const disk = data.map(d => d.disk_percent);

  if (chart) { chart.destroy(); chart = null; }

  const ctx = document.getElementById('metricsChart').getContext('2d');
  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'CPU %', data: cpu, borderColor: 'var(--accent-blue)', backgroundColor: 'rgba(88,166,255,0.08)', tension: 0.3, fill: true, pointRadius: 0, pointHoverRadius: 4 },
        { label: 'Memory %', data: mem, borderColor: 'var(--accent-purple)', backgroundColor: 'rgba(163,113,247,0.08)', tension: 0.3, fill: true, pointRadius: 0, pointHoverRadius: 4 },
        { label: 'Disk %', data: disk, borderColor: 'var(--accent-green)', backgroundColor: 'rgba(63,185,80,0.08)', tension: 0.3, fill: true, pointRadius: 0, pointHoverRadius: 4 },
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      interaction: { intersect: false, mode: 'index' },
      plugins: {
        legend: { labels: { color: 'var(--text-muted)', boxWidth: 12, padding: 16, font: { size: 12 } } },
        tooltip: { backgroundColor: '#2d333b', borderColor: 'var(--border)', borderWidth: 1, titleColor: 'var(--text)', bodyColor: 'var(--text-muted)', padding: 10 }
      },
      scales: {
        x: { ticks: { color: 'var(--text-dim)', maxTicksLimit: 10, font: { size: 11 } }, grid: { color: 'rgba(48,54,61,0.5)' } },
        y: { min: 0, max: 100, ticks: { color: 'var(--text-dim)', callback: v => v + '%', font: { size: 11 } }, grid: { color: 'rgba(48,54,61,0.5)' } }
      }
    }
  });
}

async function loadContainers() {
  const res = await fetch('/api/containers');
  if (!res.ok) return;
  const containers = await res.json();
  const el = document.getElementById('container-list');
  const countEl = document.getElementById('container-count');

  if (!containers || containers.length === 0) {
    el.innerHTML = '<div class="empty-state">No containers found</div>';
    countEl.textContent = '0';
    return;
  }

  countEl.textContent = containers.length;
  el.innerHTML = containers.map(c => {
    const cpu = (c.cpu_percent || 0).toFixed(1);
    const mem = (c.memory_percent || 0).toFixed(1);
    const memUsage = fmtBytes(c.memory_usage || 0);
    return '<div class="container-item">' +
      '<span class="container-name"><span class="dot"></span>' + (c.container_name || c.container_id.slice(0,12)) + '</span>' +
      '<div class="container-stats">' +
        '<span class="cpu-stat">CPU ' + cpu + '%</span>' +
        '<span class="mem-stat">Mem ' + mem + '%</span>' +
        '<span>' + memUsage + '</span>' +
      '</div>' +
    '</div>';
  }).join('');
}

function setChartRange(hours) {
  chartRange = hours;
  document.querySelectorAll('.chart-tabs button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  loadHistory();
}

// ── Init ───────────────────────────────────────────────────────────────────────
async function init() {
  cpuGauge.draw(0);
  memGauge.draw(0);
  diskGauge.draw(0);

  await loadMetrics();
  await loadHistory();
  await loadContainers();

  setInterval(loadMetrics, 5000);
  setInterval(loadHistory, 30000);
  setInterval(loadContainers, 15000);
}

// Uptime ticker
setInterval(() => {
  if (systemUptime > 0) {
    systemUptime += 5;
    document.getElementById('header-uptime').textContent = fmtUptime(systemUptime);
  }
}, 5000);

window.addEventListener('resize', () => {
  fetch('/api/metrics').then(r => r.json()).then(m => {
    cpuGauge.draw(m.cpu_percent || 0);
    memGauge.draw(m.memory_percent || 0);
    diskGauge.draw(m.disk_percent || 0);
  }).catch(() => {});
});

init();
</script>
</body>
</html>
