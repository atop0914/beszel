<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beszel — Server Monitor</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f1117; color: #e6edf3; min-height: 100vh; }
  header { background: #161b22; border-bottom: 1px solid #30363d; padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; }
  header h1 { font-size: 1.25rem; font-weight: 600; }
  header .hostname { color: #8b949e; font-size: 0.875rem; }
  main { padding: 1.5rem 2rem; max-width: 1200px; margin: 0 auto; }
  .gauge-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
  .gauge-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 1.25rem; display: flex; flex-direction: column; align-items: center; }
  .gauge-card h3 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #8b949e; margin-bottom: 0.75rem; }
  .gauge-container { position: relative; width: 120px; height: 120px; }
  .gauge-canvas { width: 100%; height: 100%; }
  .gauge-value { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 1.5rem; font-weight: 700; }
  .gauge-detail { font-size: 0.8rem; color: #8b949e; margin-top: 0.5rem; text-align: center; }
  .network-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; width: 100%; margin-top: 0.5rem; }
  .network-item { background: #21262d; border-radius: 6px; padding: 0.5rem; text-align: center; }
  .network-item .label { font-size: 0.65rem; color: #8b949e; text-transform: uppercase; }
  .network-item .value { font-size: 0.9rem; font-weight: 600; margin-top: 0.25rem; }
  .network-item.rx .value { color: #58a6ff; }
  .network-item.tx .value { color: #a371f7; }
  .chart-section { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 1.25rem; margin-bottom: 1.5rem; }
  .chart-section h3 { font-size: 0.875rem; margin-bottom: 1rem; }
  .chart-tabs { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
  .chart-tabs button { background: #21262d; border: 1px solid #30363d; color: #8b949e; padding: 0.35rem 0.75rem; border-radius: 6px; cursor: pointer; font-size: 0.8rem; }
  .chart-tabs button.active { background: #388bfd33; border-color: #388bfd; color: #58a6ff; }
  .containers-section { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 1.25rem; }
  .containers-section h3 { font-size: 0.875rem; margin-bottom: 1rem; }
  .container-list { display: flex; flex-direction: column; gap: 0.5rem; }
  .container-item { background: #21262d; border-radius: 6px; padding: 0.75rem 1rem; display: flex; justify-content: space-between; align-items: center; }
  .container-name { font-size: 0.875rem; font-weight: 500; }
  .container-stats { display: flex; gap: 1.5rem; font-size: 0.8rem; color: #8b949e; }
  .updated { text-align: center; font-size: 0.75rem; color: #484f58; margin-top: 1rem; }
  .loading { opacity: 0.5; }
  @media (max-width: 900px) { .gauge-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 600px) { .gauge-grid { grid-template-columns: 1fr 1fr; } main { padding: 1rem; } header { padding: 1rem; } }
</style>
</head>
<body>
<header>
  <h1>⚡ Beszel</h1>
  <span class="hostname" id="hostname">—</span>
</header>
<main>
  <div class="gauge-grid">
    <div class="gauge-card">
      <h3>CPU</h3>
      <div class="gauge-container">
        <canvas class="gauge-canvas" id="cpu-gauge" width="240" height="240"></canvas>
        <div class="gauge-value" id="cpu-val">—</div>
      </div>
      <div class="gauge-detail" id="cpu-detail">—</div>
    </div>
    <div class="gauge-card">
      <h3>Memory</h3>
      <div class="gauge-container">
        <canvas class="gauge-canvas" id="mem-gauge" width="240" height="240"></canvas>
        <div class="gauge-value" id="mem-val">—</div>
      </div>
      <div class="gauge-detail" id="mem-detail">—</div>
    </div>
    <div class="gauge-card">
      <h3>Disk</h3>
      <div class="gauge-container">
        <canvas class="gauge-canvas" id="disk-gauge" width="240" height="240"></canvas>
        <div class="gauge-value" id="disk-val">—</div>
      </div>
      <div class="gauge-detail" id="disk-detail">—</div>
    </div>
    <div class="gauge-card">
      <h3>Network I/O</h3>
      <div class="network-grid">
        <div class="network-item rx">
          <div class="label">↓ RX</div>
          <div class="value" id="net-rx">—</div>
        </div>
        <div class="network-item tx">
          <div class="label">↑ TX</div>
          <div class="value" id="net-tx">—</div>
        </div>
      </div>
      <div class="gauge-detail" id="net-total">Total: —</div>
    </div>
  </div>

  <div class="chart-section">
    <div class="chart-tabs">
      <button class="active" onclick="setChartRange(24)">24h</button>
      <button onclick="setChartRange(168)">7d</button>
    </div>
    <h3>System Metrics</h3>
    <canvas id="metricsChart" height="100"></canvas>
  </div>

  <div class="containers-section">
    <h3>🐳 Docker Containers</h3>
    <div class="container-list" id="container-list">
      <div style="color:#8b949e;font-size:0.875rem">No containers found</div>
    </div>
  </div>
  <div class="updated" id="updated">Loading…</div>
</main>
<script>
// Gauge drawing utility
class Gauge {
  constructor(canvasId, color) {
    this.canvas = document.getElementById(canvasId);
    this.ctx = this.canvas.getContext('2d');
    this.color = color;
    this.value = 0;
    this.previousValue = 0;
  }

  draw(percent) {
    const dpr = window.devicePixelRatio || 1;
    const rect = this.canvas.getBoundingClientRect();
    this.canvas.width = rect.width * dpr;
    this.canvas.height = rect.height * dpr;
    this.ctx.scale(dpr, dpr);

    const cx = rect.width / 2;
    const cy = rect.height / 2;
    const radius = Math.min(cx, cy) - 10;
    const lineWidth = 8;
    const startAngle = Math.PI * 0.75;
    const endAngle = Math.PI * 2.25;
    const range = endAngle - startAngle;

    // Background arc
    this.ctx.beginPath();
    this.ctx.arc(cx, cy, radius, startAngle, endAngle);
    this.ctx.strokeStyle = '#21262d';
    this.ctx.lineWidth = lineWidth;
    this.ctx.lineCap = 'round';
    this.ctx.stroke();

    // Value arc
    const valueAngle = startAngle + (range * Math.min(percent, 100) / 100);
    const grad = this.ctx.createLinearGradient(0, 0, rect.width, rect.height);
    grad.addColorStop(0, this.color);
    grad.addColorStop(1, this.adjustColor(this.color, -30));
    this.ctx.beginPath();
    this.ctx.arc(cx, cy, radius, startAngle, valueAngle);
    this.ctx.strokeStyle = grad;
    this.ctx.lineWidth = lineWidth;
    this.ctx.lineCap = 'round';
    this.ctx.stroke();
  }

  adjustColor(hex, amount) {
    const num = parseInt(hex.slice(1), 16);
    const r = Math.min(255, Math.max(0, (num >> 16) + amount));
    const g = Math.min(255, Math.max(0, ((num >> 8) & 0x00FF) + amount));
    const b = Math.min(255, Math.max(0, (num & 0x0000FF) + amount));
    return '#' + (0x1000000 + (r << 16) + (g << 8) + b).toString(16).slice(1);
  }
}

// Initialize gauges
const cpuGauge = new Gauge('cpu-gauge', '#58a6ff');
const memGauge = new Gauge('mem-gauge', '#a371f7');
const diskGauge = new Gauge('disk-gauge', '#3fb950');

let chart = null;
let chartRange = 24;

function fmtBytes(b) {
  if (b < 1024) return b + ' B';
  if (b < 1024 * 1024) return (b / 1024).toFixed(1) + ' KB';
  if (b < 1024 * 1024 * 1024) return (b / (1024 * 1024)).toFixed(1) + ' MB';
  return (b / (1024 * 1024 * 1024)).toFixed(2) + ' GB';
}

function fmtRate(bps) {
  if (bps < 1024) return bps + ' B/s';
  if (bps < 1024 * 1024) return (bps / 1024).toFixed(1) + ' KB/s';
  return (bps / (1024 * 1024)).toFixed(2) + ' MB/s';
}

function colorFor(pct) {
  if (pct < 50) return '#3fb950';
  if (pct < 80) return '#f0883e';
  return '#f85149';
}

let lastNetworkRX = 0;
let lastNetworkTX = 0;
let lastNetworkTime = 0;
let currentRXRate = 0;
let currentTXRate = 0;

async function loadMetrics() {
  const res = await fetch('/api/metrics');
  if (!res.ok) return;
  const m = await res.json();

  document.getElementById('hostname').textContent = m.hostname || 'unknown';

  // Update gauges
  const cpuPct = m.cpu_percent || 0;
  const memPct = m.memory_percent || 0;
  const diskPct = m.disk_percent || 0;

  cpuGauge.draw(cpuPct);
  memGauge.draw(memPct);
  diskGauge.draw(diskPct);

  document.getElementById('cpu-val').textContent = cpuPct.toFixed(1) + '%';
  document.getElementById('cpu-val').style.color = colorFor(cpuPct);

  document.getElementById('mem-val').textContent = memPct.toFixed(1) + '%';
  document.getElementById('mem-val').style.color = colorFor(memPct);
  document.getElementById('mem-detail').textContent = fmtBytes(m.memory_used) + ' / ' + fmtBytes(m.memory_total);

  document.getElementById('disk-val').textContent = diskPct.toFixed(1) + '%';
  document.getElementById('disk-val').style.color = colorFor(diskPct);
  document.getElementById('disk-detail').textContent = fmtBytes(m.disk_used) + ' / ' + fmtBytes(m.disk_total);

  // Network rate calculation
  const now = Date.now();
  if (lastNetworkTime > 0) {
    const dt = (now - lastNetworkTime) / 1000;
    if (dt > 0) {
      currentRXRate = (m.network_rx - lastNetworkRX) / dt;
      currentTXRate = (m.network_tx - lastNetworkTX) / dt;
    }
  }
  lastNetworkRX = m.network_rx;
  lastNetworkTX = m.network_tx;
  lastNetworkTime = now;

  document.getElementById('net-rx').textContent = fmtRate(currentRXRate);
  document.getElementById('net-tx').textContent = fmtRate(currentTXRate);
  document.getElementById('net-total').textContent = 'Total: ' + fmtBytes(m.network_rx + m.network_tx);

  document.getElementById('updated').textContent = 'Updated ' + new Date().toLocaleTimeString();
}

async function loadHistory() {
  const res = await fetch('/api/metrics/history?hours=' + chartRange);
  if (!res.ok) return;
  const data = await res.json();
  if (!data || data.length === 0) return;

  const labels = data.map(d => {
    const t = new Date(d.timestamp);
    return chartRange <= 24 ? t.toLocaleTimeString() : t.toLocaleDateString();
  });

  const cpu = data.map(d => d.cpu_percent);
  const mem = data.map(d => d.memory_percent);
  const disk = data.map(d => d.disk_percent);

  if (chart) chart.destroy();

  const ctx = document.getElementById('metricsChart').getContext('2d');
  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'CPU %', data: cpu, borderColor: '#58a6ff', backgroundColor: '#58a6ff22', tension: 0.3, fill: true },
        { label: 'Memory %', data: mem, borderColor: '#a371f7', backgroundColor: '#a371f722', tension: 0.3, fill: true },
        { label: 'Disk %', data: disk, borderColor: '#3fb950', backgroundColor: '#3fb95022', tension: 0.3, fill: true },
      ]
    },
    options: {
      responsive: true,
      interaction: { intersect: false, mode: 'index' },
      plugins: { legend: { labels: { color: '#8b949e' } } },
      scales: {
        x: { ticks: { color: '#484f58', maxTicksLimit: 8 }, grid: { color: '#21262d' } },
        y: { min: 0, max: 100, ticks: { color: '#484f58' }, grid: { color: '#21262d' } }
      }
    }
  });
}

async function loadContainers() {
  const res = await fetch('/api/containers');
  if (!res.ok) return;
  const containers = await res.json();
  const el = document.getElementById('container-list');

  if (!containers || containers.length === 0) {
    el.innerHTML = '<div style="color:#8b949e;font-size:0.875rem">No containers found</div>';
    return;
  }

  el.innerHTML = containers.map(c => {
    const cpu = (c.cpu_percent || 0).toFixed(1);
    const mem = (c.memory_percent || 0).toFixed(1);
    return '<div class="container-item">' +
      '<span class="container-name">' + (c.container_name || c.container_id) + '</span>' +
      '<div class="container-stats">' +
        '<span>CPU: ' + cpu + '%</span>' +
        '<span>Mem: ' + mem + '%</span>' +
      '</div>' +
    '</div>';
  }).join('');
}

function setChartRange(hours) {
  chartRange = hours;
  document.querySelectorAll('.chart-tabs button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  loadHistory();
}

async function init() {
  // Draw initial empty gauges
  cpuGauge.draw(0);
  memGauge.draw(0);
  diskGauge.draw(0);

  await loadMetrics();
  await loadHistory();
  await loadContainers();

  // Poll every 5 seconds for real-time updates
  setInterval(loadMetrics, 5000);
  setInterval(loadHistory, 30000);
  setInterval(loadContainers, 15000);
}

// Handle window resize for gauges
window.addEventListener('resize', () => {
  fetch('/api/metrics')
    .then(r => r.json())
    .then(m => {
      cpuGauge.draw(m.cpu_percent || 0);
      memGauge.draw(m.memory_percent || 0);
      diskGauge.draw(m.disk_percent || 0);
    });
});

init();
</script>
</body>
</html>
